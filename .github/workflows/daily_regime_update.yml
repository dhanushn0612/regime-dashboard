name: Daily Regime Update

on:
  schedule:
    - cron: '30 4 * * 1-5'   # 10:00 AM IST, Mon-Fri
  workflow_dispatch:

jobs:
  update-regime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests xgboost scikit-learn

      - name: Run regime classifier
        run: |
          python data_pipeline/run_classifier.py

      - name: Run sector rotation engine
        run: |
          python data_pipeline/sector_rotation.py

      - name: Commit updated data
        run: |
          git config user.name "regime-bot"
          git config user.email "bot@regime.app"
          git add public/regime_current.json public/regime_history.json
          git add public/sector_current.json public/sector_history.json
          git add data_pipeline/sector_model.pkl || true
          git diff --staged --quiet || git commit -m "📊 Regime + sector update $(date +'%Y-%m-%d')"
          git push
